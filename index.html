<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurBox | Software Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .box-shadow { box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39); }
        .admin-glow { border: 1px solid rgba(59, 130, 246, 0.1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.05); }
        .ourbox-logo { height: 110px; width: auto; margin: 0 auto; display: block; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-20">

    <div class="max-w-3xl mx-auto py-12 px-4">
        <div class="text-center mb-12">
            <svg class="ourbox-logo mb-2" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
                <g stroke="#2D3748" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M50 45 L22 55 L22 75 L50 85 L78 75 L78 55 Z"/>
                    <path d="M50 45 L50 65 M50 65 L22 55 M50 65 L78 55"/>
                    <path d="M22 55 L8 42 L36 32 M78 55 L92 42 L64 32"/>
                    <path d="M50 45 L36 32 M50 45 L64 32"/>
                </g>
                <g stroke="#3B82F6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M38 60 Q20 45 28 25 L24 28 M28 25 L32 28"/><path d="M45 60 Q40 40 43 18 L39 22 M43 18 L47 22"/><path d="M55 60 Q60 40 57 18 L53 22 M57 18 L61 22"/><path d="M62 60 Q80 45 72 25 L68 28 M72 25 L76 28"/>
                </g>
            </svg>
            <h1 class="text-4xl font-black text-gray-900 tracking-tighter uppercase">Ourbox</h1>
            <p class="text-blue-500 mt-1 text-[10px] uppercase tracking-[0.3em] font-bold">Open Software Repository</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 mb-8 admin-glow">
            <div class="flex flex-col gap-5">
                <input type="text" id="folderName" placeholder="Project / Folder" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex gap-3">
                    <input type="text" id="customFileName" placeholder="File Name" class="flex-1 px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-blue-600 font-medium outline-none">
                    <input type="text" id="fileVersion" value="1.0" class="w-24 px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-center font-bold outline-none">
                </div>
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 hover:border-blue-400 transition-all">
                    <input type="file" id="fileItem" onchange="autoFillName()" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-600 file:text-white cursor-pointer" />
                </div>

                <div id="statusArea" class="hidden">
                    <div class="w-full bg-gray-100 rounded-full h-2 mb-1">
                        <div id="statusProgress" class="bg-blue-600 h-2 rounded-full progress-bar" style="width: 0%"></div>
                    </div>
                    <p id="statusText" class="text-[9px] font-bold text-gray-400 uppercase text-center tracking-widest">Processing...</p>
                </div>

                <button id="uploadBtn" onclick="uploadLargeFile()" class="w-full bg-blue-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition box-shadow active:scale-[0.98]">
                    PUBLISH TO OURBOX
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b bg-gray-50/50 flex flex-col gap-3">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-gray-800">Software Repositories</h2>
                    <button onclick="location.reload()" class="text-[10px] font-black bg-white border border-gray-200 px-3 py-1 rounded hover:bg-gray-50 transition">REFRESH ↻</button>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="searchInput" onkeyup="renderFiles()" placeholder="🔍 Search..." class="flex-1 px-4 py-2 border rounded-lg text-sm outline-none">
                    <select id="sortFilter" onchange="renderFiles()" class="px-3 py-2 border rounded-lg text-sm outline-none">
                        <option value="newest">🕒 Newest</option>
                        <option value="downloads">📥 Downloads</option>
                        <option value="likes">👍 Likes</option>
                    </select>
                </div>
            </div>
            <div id="folderContainer" class="divide-y divide-gray-100">
                <div class="px-6 py-12 text-gray-300 text-sm italic text-center">Fetching from Ourdatabox...</div>
            </div>
        </div>

        <div id="adminPanel" class="mt-12 p-6 bg-white rounded-2xl border border-gray-200 shadow-sm">
            <div id="loginForm">
                <div class="flex flex-wrap gap-2">
                    <input type="email" id="adminEmail" placeholder="Email" class="flex-1 min-w-[200px] px-3 py-2 bg-gray-50 border rounded-lg text-sm outline-none">
                    <input type="password" id="adminPass" placeholder="Password" class="flex-1 min-w-[200px] px-3 py-2 bg-gray-50 border rounded-lg text-sm outline-none">
                    <button onclick="adminLogin()" class="bg-gray-900 text-white px-6 py-2 rounded-lg text-xs font-bold">UNLOCK</button>
                </div>
            </div>
            <div id="adminStatus" class="hidden flex items-center gap-3 text-blue-600 font-bold text-sm">
                <span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[10px]">ADMIN</span>
                <span>Welcome back, Kalacs</span>
                <button onclick="auth.signOut().then(() => location.reload())" class="ml-auto text-gray-400 text-xs">Logout</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, getDocs, where, onSnapshot, orderBy, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCib_TOfhgrLyzczdJd2M2owf_nGRqfxRA",
            authDomain: "ourbox-4bc94.firebaseapp.com",
            projectId: "ourbox-4bc94",
            storageBucket: "ourbox-4bc94.firebasestorage.app",
            messagingSenderId: "132533902062",
            appId: "1:132533902062:web:368dddb4a6e7a07ea9b1ff",
            measurementId: "G-GY35ELM12P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let isAdmin = false, allFiles = [], votedItems = JSON.parse(localStorage.getItem('ourbox_votes') || '[]');

        window.autoFillName = () => {
            const file = document.getElementById('fileItem').files[0];
            if (file) document.getElementById('customFileName').value = file.name;
        };

        onAuthStateChanged(auth, (user) => {
            if (user?.email === "kalacsgaming@gmail.com") {
                isAdmin = true;
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('adminStatus').classList.remove('hidden');
                renderFiles();
            }
        });

        window.adminLogin = async () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Access Denied"); }
        };

        // --- ENHANCED UPLOAD ---
        window.uploadLargeFile = async function() {
            const file = document.getElementById('fileItem').files[0];
            const name = document.getElementById('customFileName').value.trim();
            const folder = document.getElementById('folderName').value.trim() || "Main Bundle";
            const version = document.getElementById('fileVersion').value.trim() || "1.0";
            
            if (!file || !name) return alert("Select a file first.");
            
            const CHUNK_SIZE = 700000;
            const reader = new FileReader();
            
            const status = document.getElementById('statusArea');
            const progress = document.getElementById('statusProgress');
            const text = document.getElementById('statusText');

            status.classList.remove('hidden');
            document.getElementById('uploadBtn').disabled = true;

            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result;
                const totalChunks = Math.ceil(base64.length / CHUNK_SIZE);
                
                try {
                    const header = await addDoc(collection(db, "Ourdatabox"), {
                        folder, name, version, downloads: 0, likes: 0, dislikes: 0,
                        totalChunks, createdAt: new Date(), isHeader: true,
                        fileSize: (file.size / 1024).toFixed(1) + " KB"
                    });

                    for (let i = 0; i < totalChunks; i++) {
                        const start = i * CHUNK_SIZE;
                        await addDoc(collection(db, "OurChunks"), {
                            parentId: header.id,
                            chunkIndex: i,
                            data: base64.slice(start, start + CHUNK_SIZE),
                            createdAt: new Date()
                        });
                        let p = Math.round(((i + 1) / totalChunks) * 100);
                        progress.style.width = p + '%';
                        text.innerText = `UPLOADING: ${p}%`;
                    }
                    alert("Success!");
                    location.reload();
                } catch (e) { alert("Upload Failed: " + e.message); }
            };
        };

        // --- ENHANCED DOWNLOAD WITH DELAY & INDEX CHECK ---
        window.triggerDownload = async (id, name) => {
            const status = document.getElementById('statusArea');
            const progress = document.getElementById('statusProgress');
            const text = document.getElementById('statusText');

            status.classList.remove('hidden');
            progress.style.width = '20%';
            text.innerText = "Connecting...";

            // Start a safety timeout
            const timeout = setTimeout(() => {
                text.innerText = "Still reassembling... checking connection...";
            }, 3000);

            try {
                // Fetch segments
                const qChunks = query(
                    collection(db, "OurChunks"), 
                    where("parentId", "==", id), 
                    orderBy("chunkIndex", "asc")
                );
                
                const sn = await getDocs(qChunks);
                clearTimeout(timeout); // Data found, stop the warning timer

                if (sn.empty) {
                    // Delay the error message slightly to be sure it's not a temporary lag
                    setTimeout(() => {
                        alert("Error: File segments not found or index is building. Check Console (F12) for a link.");
                        status.classList.add('hidden');
                    }, 2000);
                    return;
                }

                let fullData = "";
                let count = 0;
                sn.forEach(doc => {
                    fullData += doc.data().data;
                    count++;
                    let p = Math.round((count / sn.size) * 100);
                    progress.style.width = p + '%';
                    text.innerText = `STITCHING: ${p}%`;
                });

                text.innerText = "READY!";
                const a = document.createElement('a');
                a.href = fullData; a.download = name;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);

                await updateDoc(doc(db, "Ourdatabox", id), { downloads: increment(1) });
                setTimeout(() => status.classList.add('hidden'), 1500);

            } catch (e) {
                console.error("Critical Download Error:", e);
                // If it's an index error, the message will contain a URL
                const errorMsg = e.message.includes("index") ? "Database Indexing Required. See Console (F12) for link." : "Connection Timeout.";
                setTimeout(() => {
                    alert("Download Failed: " + errorMsg);
                    status.classList.add('hidden');
                }, 3000); // 3 second delay before showing the error
            }
        };

        window.deleteFile = async (id) => {
            if (!confirm("Delete permanently?")) return;
            const chunks = await getDocs(query(collection(db, "OurChunks"), where("parentId", "==", id)));
            chunks.forEach(async c => await deleteDoc(doc(db, "OurChunks", c.id)));
            await deleteDoc(doc(db, "Ourdatabox", id));
            alert("Deleted.");
        };

        window.vote = async (id, type) => {
            if (votedItems.includes(id)) return;
            await updateDoc(doc(db, "Ourdatabox", id), { [type === 'up' ? 'likes' : 'dislikes']: increment(1) });
            votedItems.push(id);
            localStorage.setItem('ourbox_votes', JSON.stringify(votedItems));
        };

        window.toggleFolder = (id) => {
            const el = document.getElementById(id), icon = document.getElementById('icon-' + id);
            el.classList.toggle('hidden');
            icon.innerText = el.classList.contains('hidden') ? '◀' : '▼';
        };

        window.renderFiles = () => {
            const container = document.getElementById('folderContainer');
            const searchQ = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortFilter').value;
            const groups = {};

            allFiles.forEach(f => {
                const fold = f.folder || "Main Bundle";
                if (searchQ && !f.name.toLowerCase().includes(searchQ) && !fold.toLowerCase().includes(searchQ)) return;
                if (!groups[fold]) groups[fold] = [];
                groups[fold].push(f);
            });

            container.innerHTML = "";
            const keys = Object.keys(groups).sort();
            if (keys.length === 0) {
                container.innerHTML = '<div class="p-20 text-center text-gray-300 font-bold">REPOS EMPTY</div>';
                return;
            }

            keys.forEach(folder => {
                const files = groups[folder];
                files.sort((a,b) => {
                    if(sortBy === 'downloads') return (b.downloads || 0) - (a.downloads || 0);
                    if(sortBy === 'likes') return (b.likes || 0) - (a.likes || 0);
                    return 0;
                });
                const safeId = 'f-' + folder.replace(/\W/g, '');
                const section = document.createElement('div');
                section.innerHTML = `
                    <div onclick="toggleFolder('${safeId}')" class="cursor-pointer px-6 py-3 bg-gray-50/80 text-[10px] font-black text-gray-500 uppercase flex justify-between items-center hover:bg-gray-100 select-none">
                        <span>📂 ${folder} (${files.length})</span> <span id="icon-${safeId}">▼</span>
                    </div>
                    <ul id="${safeId}" class="divide-y divide-gray-50">
                        ${files.map(f => `
                            <li class="px-6 py-4 flex flex-col sm:flex-row sm:justify-between sm:items-center hover:bg-blue-50/10 gap-3 transition">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-sm font-bold text-gray-800">${f.name}</span>
                                        <span class="bg-gray-800 text-white text-[9px] px-1.5 py-0.5 rounded font-bold">v${f.version}</span>
                                    </div>
                                    <div class="flex gap-2 mt-1">
                                        <span class="text-[9px] font-bold text-gray-400">📥 ${f.downloads}</span>
                                        <button onclick="vote('${f.id}','up')" class="text-[9px] font-bold text-green-600 hover:underline">👍 ${f.likes}</button>
                                        <button onclick="vote('${f.id}','down')" class="text-[9px] font-bold text-red-500 hover:underline">👎 ${f.dislikes}</button>
                                        <span class="text-[9px] font-bold text-blue-400 ml-1 opacity-60">${f.fileSize || ''}</span>
                                    </div>
                                </div>
                                <div class="flex gap-3">
                                    <button onclick="triggerDownload('${f.id}','${f.name}')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-[10px] font-black hover:bg-blue-600 hover:text-white transition active:scale-95">Download</button>
                                    ${isAdmin ? `<button onclick="deleteFile('${f.id}')" class="text-red-400 text-[10px] font-black uppercase hover:text-red-600">Remove</button>` : ''}
                                </div>
                            </li>
                        `).join('')}
                    </ul>`;
                container.appendChild(section);
            });
        };

        const q = query(collection(db, "Ourdatabox"), orderBy("createdAt", "desc"));
        onSnapshot(q, (sn) => {
            allFiles = [];
            sn.forEach(d => { if(d.data().isHeader) allFiles.push({id: d.id, ...d.data()}); });
            renderFiles();
        });

        window.auth = auth;
    </script>
</body>
</html>
